title: AC Docs
description: ActiveCampaign integration guides for solution engineers and developers

remote_theme: just-the-docs/just-the-docs

color_scheme: ac-dark
heading_anchors: true

logo: "/assets/images/ac-logo.svg"

search_enabled: true
search_placeholder: "Search Documentation"
search:
  placeholder: "Search Documentation"

footer_content: "ActiveCampaign integration guides."

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag
